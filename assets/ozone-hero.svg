<svg width="1200" height="360" viewBox="0 0 1200 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ozone Prediction API Banner</title>
  <desc id="desc">Stylized hero banner for the Ozone Prediction API project.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1221">
        <animate attributeName="stop-color" values="#0b1221;#10213a;#0b1221" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0f7c90">
        <animate attributeName="stop-color" values="#0f7c90;#0e9f6e;#0f7c90" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="glowA" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6ee7ff" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#6ee7ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="#34d399" stop-opacity="0"/>
    </radialGradient>
    <filter id="softBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <style>
      .title { font: 700 56px "Segoe UI", Tahoma, Arial, sans-serif; fill: #f8fafc; letter-spacing: 0.4px; }
      .subtitle { font: 400 24px "Segoe UI", Tahoma, Arial, sans-serif; fill: #cfe8f3; }
      .pill { fill: rgba(255, 255, 255, 0.12); stroke: rgba(255, 255, 255, 0.25); stroke-width: 1; }
      .pillText { font: 600 16px "Segoe UI", Tahoma, Arial, sans-serif; fill: #f8fafc; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="360" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="358" rx="24" ry="24" fill="none" stroke="rgba(255,255,255,0.14)"/>

  <circle cx="920" cy="110" r="160" fill="url(#glowA)" filter="url(#softBlur)">
    <animate attributeName="cx" values="900;940;900" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1030" cy="250" r="140" fill="url(#glowB)" filter="url(#softBlur)">
    <animate attributeName="cy" values="250;220;250" dur="9s" repeatCount="indefinite"/>
  </circle>

  <g opacity="0.3">
    <circle cx="150" cy="70" r="3.5" fill="#d1fae5">
      <animate attributeName="cy" values="70;56;70" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="210" cy="120" r="2.8" fill="#a5f3fc">
      <animate attributeName="cy" values="120;134;120" dur="4.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="270" cy="90" r="3.2" fill="#86efac">
      <animate attributeName="cy" values="90;76;90" dur="5.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1120" cy="80" r="3.5" fill="#d1fae5">
      <animate attributeName="cy" values="80;68;80" dur="5.4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <text x="72" y="148" class="title">Ozone Prediction API</text>
  <text x="72" y="190" class="subtitle">Atmospheric Forecasting with ML, DL, and AI Explanations</text>

  <g transform="translate(72,230)">
    <rect x="0" y="0" rx="20" ry="20" width="160" height="42" class="pill"/>
    <text x="80" y="27" text-anchor="middle" class="pillText">FastAPI</text>
    <rect x="174" y="0" rx="20" ry="20" width="150" height="42" class="pill"/>
    <text x="249" y="27" text-anchor="middle" class="pillText">Ensemble ML</text>
    <rect x="338" y="0" rx="20" ry="20" width="170" height="42" class="pill"/>
    <text x="423" y="27" text-anchor="middle" class="pillText">Deep Learning</text>
    <rect x="522" y="0" rx="20" ry="20" width="190" height="42" class="pill"/>
    <text x="617" y="27" text-anchor="middle" class="pillText">Google Gemini</text>
  </g>
</svg>
