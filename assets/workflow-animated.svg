<svg width="1200" height="460" viewBox="0 0 1200 460" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated Prediction Workflow</title>
  <desc id="desc">Animated workflow from data ingestion to API response and dashboard output.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#071122"/>
      <stop offset="100%" stop-color="#0b2031"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="nodeGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .card { fill: rgba(15, 23, 42, 0.85); stroke: rgba(148, 163, 184, 0.4); stroke-width: 1.4; }
      .head { font: 700 18px Segoe UI, Tahoma, Arial, sans-serif; fill: #f8fafc; }
      .body { font: 400 13px Segoe UI, Tahoma, Arial, sans-serif; fill: #cbd5e1; }
      .flow { fill: none; stroke: url(#line); stroke-width: 4; stroke-linecap: round; stroke-dasharray: 12 10; animation: dash 2.2s linear infinite; }
      .dot { fill: #34d399; filter: url(#nodeGlow); animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      .dot-delay { animation-delay: 0.7s; }
      .dot-delay2 { animation-delay: 1.2s; }
      .dot-delay3 { animation-delay: 1.8s; }
      @keyframes dash { to { stroke-dashoffset: -44; } }
      @keyframes pulse {
        0% { transform: scale(1); opacity: 0.8; }
        50% { transform: scale(1.25); opacity: 1; }
        100% { transform: scale(1); opacity: 0.8; }
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="460" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="458" rx="20" ry="20" fill="none" stroke="rgba(148,163,184,0.28)"/>

  <text x="52" y="52" class="head" style="font-size:26px;">End-to-End Prediction Workflow</text>
  <text x="52" y="80" class="body" style="font-size:15px;">From engineered weather signals to multi-model ozone prediction and explanation.</text>

  <rect x="48" y="130" width="180" height="88" rx="14" class="card"/>
  <text x="66" y="162" class="head">1. Input Data</text>
  <text x="66" y="184" class="body">Pressure + temporal</text>
  <text x="66" y="202" class="body">lag features</text>

  <rect x="260" y="130" width="210" height="88" rx="14" class="card"/>
  <text x="278" y="162" class="head">2. Validation</text>
  <text x="278" y="184" class="body">Pydantic schema checks</text>
  <text x="278" y="202" class="body">and normalization</text>

  <rect x="500" y="130" width="210" height="88" rx="14" class="card"/>
  <text x="518" y="162" class="head">3. Inference</text>
  <text x="518" y="184" class="body">ML + DL models run</text>
  <text x="518" y="202" class="body">in parallel</text>

  <rect x="740" y="130" width="190" height="88" rx="14" class="card"/>
  <text x="758" y="162" class="head">4. Ensemble</text>
  <text x="758" y="184" class="body">Aggregate predictions</text>
  <text x="758" y="202" class="body">with statistics</text>

  <rect x="958" y="130" width="190" height="88" rx="14" class="card"/>
  <text x="976" y="162" class="head">5. Output</text>
  <text x="976" y="184" class="body">REST response +</text>
  <text x="976" y="202" class="body">dashboard display</text>

  <path class="flow" d="M228 174 L260 174"/>
  <path class="flow" d="M470 174 L500 174"/>
  <path class="flow" d="M710 174 L740 174"/>
  <path class="flow" d="M930 174 L958 174"/>

  <circle cx="244" cy="174" r="6" class="dot"/>
  <circle cx="485" cy="174" r="6" class="dot dot-delay"/>
  <circle cx="725" cy="174" r="6" class="dot dot-delay2"/>
  <circle cx="944" cy="174" r="6" class="dot dot-delay3"/>

  <rect x="210" y="292" width="770" height="112" rx="16" class="card"/>
  <text x="234" y="328" class="head">Optional AI Explanation Branch</text>
  <text x="234" y="352" class="body">When GOOGLE_API_KEY is configured, prediction context is sent to Gemini</text>
  <text x="234" y="372" class="body">to generate human-friendly risk and health guidance text.</text>

  <path class="flow" d="M605 218 L605 292"/>
  <circle cx="605" cy="256" r="6" class="dot dot-delay2"/>
</svg>
