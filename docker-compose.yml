version: '3.8'

services:
  ozone-api:
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: ozone-api
    
    ports:
      - "${PORT:-8000}:8000"
    
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - DEBUG=${DEBUG:-False}
      - HOST=0.0.0.0
      - PORT=8000
    
    volumes:
      # Mount models directory for easy updates
      - ./models:/app/models:ro
      
      # Mount logs (optional)
      - ./logs:/app/logs
    
    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G
    
    # Restart policy
    restart: unless-stopped
    
    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  models:
  logs:
